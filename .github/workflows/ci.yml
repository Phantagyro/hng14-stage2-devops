name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  REGISTRY: localhost:5000

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python files
        run: flake8 api/main.py worker/worker.py --max-line-length=100

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: |
          cd frontend
          npm ci
          npm install --save-dev eslint@8

      - name: Lint JavaScript
        run: |
          cd frontend
          npx eslint app.js --env node,es2021 --parser-options ecmaVersion:2021

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r api/requirements-test.txt

      - name: Run tests with coverage
        run: |
          cd api
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        run: |
          docker build \
            --cache-from ${{ env.REGISTRY }}/api:latest \
            -t ${{ env.REGISTRY }}/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/api:latest \
            ./api
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/api:latest

      - name: Build and push Worker image
        run: |
          docker build \
            --cache-from ${{ env.REGISTRY }}/api:latest \
            -t ${{ env.REGISTRY }}/worker:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/worker:latest \
            ./worker
          docker push ${{ env.REGISTRY }}/worker:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/worker:latest

      - name: Build and push Frontend image
        run: |
          docker build \
            --cache-from ${{ env.REGISTRY }}/api:latest \
            -t ${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/frontend:latest \
            ./frontend
          docker push ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Save images as tarballs
        run: |
          docker save ${{ env.REGISTRY }}/api:${{ github.sha }} | gzip > /tmp/api.tar.gz
          docker save ${{ env.REGISTRY }}/worker:${{ github.sha }} | gzip > /tmp/worker.tar.gz
          docker save ${{ env.REGISTRY }}/frontend:${{ github.sha }} | gzip > /tmp/frontend.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ github.sha }}
          path: |
            /tmp/api.tar.gz
            /tmp/worker.tar.gz
            /tmp/frontend.tar.gz

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ github.sha }}
          path: /tmp

      - name: Load Docker images
        run: |
          docker load < /tmp/api.tar.gz
          docker load < /tmp/worker.tar.gz
          docker load < /tmp/frontend.tar.gz

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan API image
        run: |
          trivy image \
            --format sarif \
            --output trivy-api.sarif \
            --severity CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --exit-code 1 \
            localhost:5000/api:${{ github.sha }}

      - name: Scan Worker image
        run: |
          trivy image \
            --format sarif \
            --output trivy-worker.sarif \
            --severity CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --exit-code 1 \
            localhost:5000/worker:${{ github.sha }}

      - name: Scan Frontend image
        run: |
          trivy image \
            --format sarif \
            --output trivy-frontend.sarif \
            --severity CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --exit-code 1 \
            localhost:5000/frontend:${{ github.sha }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ github.sha }}
          path: /tmp

      - name: Load and tag Docker images
        run: |
          docker load < /tmp/api.tar.gz
          docker load < /tmp/worker.tar.gz
          docker load < /tmp/frontend.tar.gz
          docker tag localhost:5000/api:${{ github.sha }} api:latest
          docker tag localhost:5000/worker:${{ github.sha }} worker:latest
          docker tag localhost:5000/frontend:${{ github.sha }} frontend:latest

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=${REDIS_TEST_PASSWORD}" > .env
          echo "FRONTEND_PORT=3000" >> .env
        env:
            REDIS_TEST_PASSWORD: ${{ secrets.REDIS_PASSWORD || 'testpassword123' }}

      - name: Start full stack
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for all services to be healthy
        run: |
          timeout 120 bash -c '
            while true; do
              HEALTHY=$(docker compose -f docker-compose.test.yml ps | grep -c "healthy" || true)
              echo "Healthy services: $HEALTHY/4"
              docker compose -f docker-compose.test.yml ps
              [ "$HEALTHY" -ge 4 ] && break
              sleep 5
            done
          '

      - name: Run integration test
        run: |
          JOB_RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $JOB_RESPONSE"
          JOB_ID=$(echo "$JOB_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl -sf "http://localhost:3000/status/$JOB_ID" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $ATTEMPT: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test passed!"
              exit 0
            fi
            sleep 2
            ATTEMPT=$((ATTEMPT + 1))
          done
          echo "Integration test failed - job did not complete."
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ github.sha }}
          path: /tmp

      - name: Load and tag Docker images
        run: |
          docker load < /tmp/api.tar.gz
          docker load < /tmp/worker.tar.gz
          docker load < /tmp/frontend.tar.gz
          docker tag localhost:5000/api:${{ github.sha }} api:latest
          docker tag localhost:5000/worker:${{ github.sha }} worker:latest
          docker tag localhost:5000/frontend:${{ github.sha }} frontend:latest

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=${REDIS_TEST_PASSWORD}" > .env
          echo "FRONTEND_PORT=3000" >> .env
        env:
            REDIS_TEST_PASSWORD: ${{ secrets.REDIS_PASSWORD || 'testpassword123' }}

      - name: Start initial deployment
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 20

      - name: Perform rolling update
        run: |
          chmod +x scripts/rolling-update.sh
          export COMPOSE_FILE=docker-compose.test.yml
          for SERVICE in api worker frontend; do
            bash scripts/rolling-update.sh "$SERVICE"
          done

      - name: Verify deployment
        run: |
          docker compose -f docker-compose.test.yml ps
          curl -sf http://localhost:3000/ > /dev/null && echo "Frontend OK"

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
